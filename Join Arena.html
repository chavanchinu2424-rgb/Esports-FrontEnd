<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Arena | Esports Nexus</title>
    <!-- Google Fonts for Gaming Aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-neon: #00f2ff; 
            --secondary-neon: #7000ff; 
            --bg-dark: #0a0a0c;
            --card-bg: #16161a;
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--primary-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: var(--primary-neon); }

        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 4px solid var(--secondary-neon);
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px var(--primary-neon);
        }

        .container {
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
            padding: 0 20px;
        }

        .form-section {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 10px;
            border-left: 5px solid var(--primary-neon);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-size: 1rem;
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--secondary-neon), var(--primary-neon));
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .btn-submit:hover { box-shadow: 0 0 20px var(--primary-neon); }

        .connect-sidebar {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .discord-btn {
            background: #5865F2;
            color: white;
            text-align: center;
            padding: 12px;
            display: block;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
        }

        footer { text-align: center; padding: 40px; border-top: 1px solid #333; margin-top: 50px; }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <a href="FrontEnd.html" class="logo">ARENA NEXUS</a>
        <nav>
            <a href="FrontEnd.html">Home</a>
            <a href="Championship webpage.html">Tournaments</a>
            <a href="Analytics webpage.html">Rankings</a>
        </nav>
    </header>

    <section class="hero">
        <h1>JOIN THE ARENA</h1>
        <p style="color: var(--primary-neon);">Your journey to pro gaming starts here.</p>
    </section>

    <div class="container">
        <main class="form-section">
            <h2 style="font-family: 'Orbitron'; margin-bottom: 20px;">Tournament Registration</h2>
            
            <!-- FORM START -->
            <form id="participationForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="gamerTag">Gamer Tag</label>
                    <input type="text" id="gamerTag" placeholder="e.g. HYDRAxChinuu" required>
                </div>

                <div class="form-group">
                    <label for="gameChoice">Match Selection</label>
                    <select id="gameChoice" required>
                        <option value="">-- Choose a Game --</option>
                        <option value="Valorant Pro Cup">Valorant Pro Cup</option>
                        <option value="League Masters">League of Legends Masters</option>
                        <option value="CS2 Global">CS2 Global Offensive</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">CONFIRM ENTRY</button>
            </form>
            <!-- FORM END -->
        </main>

        <aside class="connect-sidebar">
            <h2 style="font-family: 'Orbitron'; font-size: 1.2rem;">Connect With Us</h2>
            <p style="font-size: 0.9rem; color: #aaa; margin-top: 10px;">Join our community platforms:</p>
            <a href="#" class="discord-btn">JOIN OUR DISCORD</a>
        </aside>
    </div>

    <footer>
        <a href="FrontEnd.html" style="color: var(--primary-neon); text-decoration: none; font-weight: bold; display: block; margin-bottom: 15px;">← RETURN TO MAIN HUB</a>
        <p>&copy; 2024 Arena Nexus Esports. All Rights Reserved.</p>
    </footer>

    <!-- FIREBASE SYSTEM -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      // Your exact Firebase keys from screenshots
      const firebaseConfig = {
        apiKey: "AIzaSyBiP31P4r3it5-cLmlfmKCdYQzfQ77dD5A",
        authDomain: "rivals-nexus-f28f0.firebaseapp.com",
        projectId: "rivals-nexus-f28f0",
        storageBucket: "rivals-nexus-f28f0.firebasestorage.app",
        messagingSenderId: "975171196085",
        appId: "1:975171196085:web:da142147b2f1c0f0fa1afc",
        measurementId: "G-69B5HM9GLF"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Handle Form Submission
      const form = document.getElementById('participationForm');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Collecting the data from inputs
        const userData = {
          fullName: document.getElementById('fullName').value,
          gamerTag: document.getElementById('gamerTag').value,
          match: document.getElementById('gameChoice').value,
          submittedAt: serverTimestamp()
        };

        try {
          // Add to "registrations" collection
          const docRef = await addDoc(collection(db, "registrations"), userData);
          
          console.log("Document saved with ID: ", docRef.id);
          alert("REGISTRATION SUCCESSFUL! Your data is now in the database.");
          form.reset(); 
        } catch (error) {
          console.error("Firebase Error: ", error);
          alert("ERROR: Data was not saved. " + error.message);
        }
      });
    </script>
</body>
</html>
